site_name: APIC 文档
site_url: https://docs.apic.gg/
site_description: APIC 中转 / CDN 面板 —— 安装、配置、运维与参考
site_author: APIC
copyright: Copyright &copy; APIC

repo_url: https://github.com/cenbaixi/apic-docs
repo_name: apic-docs
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - 介绍: index.md
  - 使用说明:
      - 安装部署: guide/install.md
      - 线路 · 节点 · 规则: guide/usage.md
      - 协议说明: guide/protocols.md
      - 参数说明: guide/advanced.md
      - 功能说明: guide/features.md
      - 高级编辑逐项: guide/fields.md
      - 更新升级: guide/update.md
  - 常见问题: faq.md
  - 参考: reference.md
  - 常用命令: commands.md
